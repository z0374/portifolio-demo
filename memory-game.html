	function card(front){
			const carta=document.createElement('aside');
			if(window.innerWidth<=920){
			carta.style.width='27vw';
			carta.style.height='36vw';
			carta.style.borderRadius='0.42rem';
			}else{
			carta.style.width='9vw';
			carta.style.height='12vw';
			carta.style.borderRadius='0.42rem';
			}
			carta.style.margin='0.03rem';
			carta.style.position='relative';
			carta.style.transformStyle='preserve-3d';
			carta.style.perspective='3000px';
				const frente=document.createElement('figure');
				frente.style.background='white';
                frente.style.backgroundSize='100%';
                frente.style.backgroundPosition='center';
				frente.classList.add('carta');
				frente.style.transform='rotatey(180deg)';
                const img=document.createElement('img');
                img.src=front['img'];
                img.style.width='100%';frente.style.border='solid 0.09rem #000000'
                frente.title=front['lgd'];
                    frente.append(img);
					carta.append(frente);

				const verso=document.createElement('figure');
				verso.style.background='#772A23';
				verso.classList.add('carta');
					carta.append(verso);
			//carta.onmouseout=function()
			carta.onclick=function(){
                if(revelada.length>=2){return;}
                
				if(frente.style.transform!=='rotateY(360deg)'){frente.style.transform='rotateY(360deg)';verso.style.transform='rotateY(180deg)';
                    frente.classList.add('fnt');
                    verso.classList.add('vrs');
                    revelada.push(img.src);document.querySelectorAll('.carta').forEach(elm=>{elm.style.pointerEvents='none';});
                    }
                if(revelada.length>=2){
                setTimeout(()=>{
                    if(revelada.length >=2 && revelada[0]==revelada[1]){console.log('são inguainzinho');
                    document.querySelectorAll('.fnt').forEach(elm=>{elm.classList.add('encontrada');elm.classList.remove('fnt');
                    encontrada.push(elm);});
                    document.querySelectorAll('.vrs').forEach(elm=>{elm.classList.remove('vrs');});
                    document.querySelectorAll('.encontrada').forEach(elm=>{elm.style.opacity='0.3';});
                revelada=[];console.log(encontrada.length);
                    }
                    },1000);
				setTimeout(()=>{
                    if(encontrada.length>=cartas.length){
                        document.querySelectorAll('.encontrada').forEach(elm=>{
                            elm.style.opacity='1';
                            elm.classList.remove('encontrada')
                        });
                        encontrada=[];
                        app.style.background='#58C776';
                        pontos.textContent='score: '+score();
                        ganhou();
                        startTimer(timer);
                        
                        return;
                        }
                    if(revelada.length >=2 && revelada[0]!==revelada[1]){console.log('são não inguais');
                        document.querySelectorAll('.fnt').forEach(elm=>{elm.style.transform='rotateY(180deg)';elm.classList.remove('fnt');});
                        document.querySelectorAll('.vrs').forEach(elm=>{elm.style.transform='rotateY(360deg)';elm.classList.remove('vrs');});
            revelada=[];return;}
            },1200);
                }
                    return;
            }
			return carta;
		}

            
            function embaralhar(array,nm){
                    array=array.slice(array.length-nm);
                let arr = array.flatMap(item => [item, item]);
                    for (let i = arr.length-1; i > 0; i--){
                        const j = Math.floor(Math.random() * (i + 1));
                            [arr[i], arr[j]] = [arr[j], arr[i]];
                    }console.log(arr);
                    return arr;
                }
            function bt(id, click, texto, pai, boolean){
                    const bt=document.createElement('button');
                        bt.classList.add('bt');
                        bt.setAttribute('id',id);
                        bt.setAttribute('onclick',click);
                        bt.textContent = texto;
                        bt.disabled=boolean;
                        bt.hidden=boolean;
                    pai.append(bt);
                }
            function startTimer(elm) {
                if (isRunning) {
                    // Se o timer está em execução, para o timer
                    clearInterval(time);
                    seconds=0;
                    isRunning = false;
                    elm.textContent=0;
                    return;
                } else {
                    // Se o timer não está em execução, inicia o timer
                    time = setInterval(function() {
                        seconds++;
                    elm.textContent=seconds;
                    }, 1000);
                    isRunning = true;
                }
            }
           function score(){
               const cards=cartas.length ||0;
                const pontos = Math.floor(recorde+(nv * (cards*10)-(cards*seconds))*12) || 0;
                recorde=pontos;
                return pontos;
          }
